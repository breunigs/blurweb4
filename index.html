<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Drop zone ─────────────────────────────────────── */
    #drop-zone {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2e2e2e;
      background: #242424;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    #drop-zone.drag-over {
      background: #1a2a3a;
      border-color: #3a7bd5;
    }

    #drop-hint {
      font-size: 13px;
      color: #666;
      flex: 1;
      pointer-events: none;
      user-select: none;
    }

    #file-input { display: none; }

    #pick-btn {
      padding: 5px 13px;
      background: #3a7bd5;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    #pick-btn:hover { background: #2d64b8; }

    #export-btn {
      padding: 5px 13px;
      background: #2d8a4e;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    #export-btn:hover:not(:disabled) { background: #246b3d; }
    #export-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Global progress bar ───────────────────────────── */
    #global-progress {
      height: 3px;
      background: #2e2e2e;
      flex-shrink: 0;
    }
    #global-progress[hidden] { display: none; }
    #global-progress-fill {
      height: 100%;
      background: #2d8a4e;
      width: 0%;
      transition: width 0.2s ease;
    }

    /* ── Tab bar ───────────────────────────────────────── */
    #tab-bar {
      display: flex;
      overflow-x: auto;
      background: #1e1e1e;
      border-bottom: 1px solid #2e2e2e;
      min-height: 34px;
      flex-shrink: 0;
      scrollbar-width: thin;
      scrollbar-color: #444 transparent;
    }

    .tab {
      padding: 7px 16px;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      border: none;
      border-right: 1px solid #2e2e2e;
      border-bottom: 2px solid transparent;
      color: #777;
      background: transparent;
      transition: color 0.1s, background 0.1s;
    }
    .tab:hover { background: #282828; color: #bbb; }
    .tab.active { color: #e0e0e0; border-bottom-color: #3a7bd5; background: #2d2d2d; }

    /* ── Preview area ──────────────────────────────────── */
    #preview-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .canvas-wrapper {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      overflow: auto;
    }
    .canvas-wrapper.active { display: flex; }

    .canvas-wrapper canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      flex-shrink: 0;
    }

    .canvas-wrapper .error-msg {
      color: #e06060;
      font-size: 14px;
      padding: 24px;
      text-align: center;
    }

    /* ── Per-file progress bar ─────────────────────────── */
    .file-progress {
      width: 100%;
      height: 3px;
      background: #2e2e2e;
      position: absolute;
      bottom: 0;
      left: 0;
    }
    .file-progress[hidden] { display: none; }
    .file-progress-fill {
      height: 100%;
      background: #3a7bd5;
      width: 0%;
      transition: width 0.15s ease;
    }

    /* ── Detection status bar ──────────────────────────── */
    .detect-status {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 4px 10px 4px 8px;
      background: rgba(0,0,0,0.55);
      color: #ccc;
      font-size: 12px;
      font-family: monospace;
      display: flex;
      align-items: center;
      gap: 7px;
      pointer-events: none;
      z-index: 10;
    }
    .detect-status[hidden] { display: none; }
    .detect-status::before {
      content: '';
      display: inline-block;
      width: 11px; height: 11px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #bbb;
      border-radius: 50%;
      animation: det-spin 0.75s linear infinite;
      flex-shrink: 0;
    }
    @keyframes det-spin { to { transform: rotate(360deg); } }

    /* ── Empty state ───────────────────────────────────── */
    #empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #444;
      pointer-events: none;
    }

    #empty-state svg { width: 56px; height: 56px; }
    #empty-state p { font-size: 15px; }

    /* ── Video controls ────────────────────────────────── */
    #controls {
      display: none;
      padding: 8px 16px;
      background: #242424;
      border-top: 1px solid #2e2e2e;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #controls.visible { display: flex; }

    #play-btn {
      width: 30px;
      height: 30px;
      background: #3a7bd5;
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #play-btn:hover { background: #2d64b8; }

    #seek-bar {
      flex: 1;
      height: 4px;
      cursor: pointer;
      accent-color: #3a7bd5;
    }

    #time-display {
      font-size: 12px;
      color: #777;
      font-variant-numeric: tabular-nums;
      min-width: 90px;
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="drop-zone">
    <span id="drop-hint">Drop images or videos here</span>
    <button id="pick-btn">Choose files</button>
    <button id="export-btn" disabled>Export</button>
    <input id="file-input" type="file" multiple accept="image/*,video/*">
  </div>

  <div id="global-progress" hidden>
    <div id="global-progress-fill"></div>
  </div>

  <div id="tab-bar"></div>

  <div id="preview-area">
    <div id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>Drop images or videos to get started</p>
    </div>
  </div>

  <div id="controls">
    <button id="play-btn" aria-label="Play/pause">▶</button>
    <input id="seek-bar" type="range" min="0" max="1000" step="1" value="0">
    <span id="time-display">0:00 / 0:00</span>
  </div>

  <script type="module" src="/dist/bundle.js"></script>
</body>
</html>
