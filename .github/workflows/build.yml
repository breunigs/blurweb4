name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  # ── Build WASM artifacts on Linux (requires Docker) ──────────────────────────
  # These are gitignored and not available in the checkout. We build once here
  # and share to all platform jobs via artifact.
  build-wasm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache vendor WASM
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: |
            vendor/libav-hevc
            vendor/libav-avc-av1
          key: vendor-wasm-${{ hashFiles('package-lock.json') }}

      - name: Build WASM variants
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: npm run build:wasm


  # ── Build Tauri app on all platforms ─────────────────────────────────────────
  build-tauri:
    needs: build-wasm
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-target: ''
            tauri-args: ''
          - platform: windows-latest
            rust-target: ''
            tauri-args: ''
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
          - platform: macos-latest
            rust-target: x86_64-apple-darwin
            tauri-args: --target x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      - name: Restore vendor WASM from cache
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: |
            vendor/libav-hevc
            vendor/libav-avc-av1
          key: vendor-wasm-${{ hashFiles('package-lock.json') }}

      - name: Build WASM variants (cache miss fallback — Linux only)
        if: steps.cache-wasm.outputs.cache-hit != 'true' && matrix.platform == 'ubuntu-22.04'
        run: npm run build:wasm

      - name: Fail on unexpected WASM cache miss
        if: steps.cache-wasm.outputs.cache-hit != 'true' && matrix.platform != 'ubuntu-22.04'
        run: echo "::error::WASM cache miss on ${{ matrix.platform }} — build-wasm job should have populated the cache" && exit 1

      - name: Build frontend
        run: npm run build
        env:
          SKIP_HEVC_WASM: ${{ matrix.platform == 'macos-latest' && '1' || '' }}

      - name: Prepare Tauri distribution
        run: npm run prepare-tauri-dist
        env:
          SKIP_HEVC_WASM: ${{ matrix.platform == 'macos-latest' && '1' || '' }}

      - name: Generate icons
        run: npx tauri icon icon.svg

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.tauri-args }}

